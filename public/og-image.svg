<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#3B82F6" opacity="0.2" />
  <circle cx="150" cy="530" r="140" fill="#60A5FA" opacity="0.15" />

  <!-- Card -->
  <rect x="80" y="140" width="500" height="340" rx="24" fill="url(#card)" opacity="0.9" />

  <!-- Card content: 전세 → 월세 arrow -->
  <text x="140" y="240" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.8">전세</text>
  <text x="280" y="248" font-family="Arial, sans-serif" font-size="40" fill="#93C5FD">→</text>
  <text x="350" y="240" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.8">월세</text>

  <!-- Divider line -->
  <line x1="120" y1="270" x2="540" y2="270" stroke="#60A5FA" stroke-width="1" opacity="0.4" />

  <!-- Amounts -->
  <text x="140" y="320" font-family="Arial, sans-serif" font-size="22" fill="#93C5FD">보증금</text>
  <text x="140" y="355" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="white">5,000 만원</text>

  <text x="140" y="400" font-family="Arial, sans-serif" font-size="22" fill="#93C5FD">월세</text>
  <text x="140" y="435" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FCD34D">월 42 만원</text>

  <!-- Right side: title -->
  <text x="660" y="260" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="white">전월세</text>
  <text x="660" y="340" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="white">전환</text>
  <text x="660" y="420" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="#93C5FD">계산기</text>

  <!-- Subtitle -->
  <text x="660" y="480" font-family="Arial, sans-serif" font-size="26" fill="white" opacity="0.7">전세 ↔ 월세 빠른 비교</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1E40AF" opacity="0.6" />
  <text x="600" y="616" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.8" text-anchor="middle">calculate-omega-opal.vercel.app</text>
</svg>
